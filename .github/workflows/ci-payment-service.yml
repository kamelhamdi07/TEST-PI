name: CI payment-service

on:
  push:
    branches: [main, master, develop]
    paths:
      - "payment_Microsevices/payment_Microsevices/**"
      - ".github/workflows/ci-payment-service.yml"
  pull_request:
    paths:
      - "payment_Microsevices/payment_Microsevices/**"
      - ".github/workflows/ci-payment-service.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  SERVICE_NAME: payment-service
  SERVICE_DIR: payment_Microsevices/payment_Microsevices
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/payment-service

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Unit tests and JaCoCo
        working-directory: ${{ env.SERVICE_DIR }}
        run: mvn -B clean verify
      - name: SonarQube analysis
        working-directory: ${{ env.SERVICE_DIR }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: >
          mvn -B sonar:sonar
          -Dsonar.projectKey=${{ github.repository_owner }}_${{ env.SERVICE_NAME }}
          -Dsonar.projectName=${{ env.SERVICE_NAME }}
          -Dsonar.host.url=${SONAR_HOST_URL}
          -Dsonar.token=${SONAR_TOKEN}
      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.SERVICE_DIR }}
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.IMAGE_NAME }}:latest
