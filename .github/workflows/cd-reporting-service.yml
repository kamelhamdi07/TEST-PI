name: CD reporting-service

on:
  workflow_run:
    workflows: ["CI reporting-service"]
    types: [completed]
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy
        required: false
        default: latest

permissions:
  contents: read

env:
  SERVICE_NAME: reporting-service
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/reporting-service

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event != 'pull_request')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_BASE64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
      - name: Deploy manifests
        run: |
          kubectl apply -f k8s/base/00-namespace.yaml
          kubectl apply -f k8s/mysql/
          kubectl apply -f k8s/reporting-service/
          TAG="${{ github.event.inputs.image_tag || github.event.workflow_run.head_sha }}"
          kubectl -n pi-platform set image deployment/reporting-service reporting-service=${IMAGE_NAME}:${TAG}
          kubectl -n pi-platform rollout status deployment/reporting-service --timeout=180s
