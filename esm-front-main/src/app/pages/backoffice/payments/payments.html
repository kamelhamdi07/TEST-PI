<div class="payment-wrapper">

  <div class="payment-card">

    <div class="card-header">
      <h2>Payments Management</h2>
      <span class="count">{{payments.length}} Records</span>
    </div>
    <div class="filters">

  <input
    type="text"
    placeholder="Search by ID or Method..."
    [(ngModel)]="searchTerm"
  />

  <select [(ngModel)]="selectedStatus">
    <option value="">All Status</option>
    <option value="PENDING">Pending</option>
    <option value="PAID">Paid</option>
    <option value="FAILED">Failed</option>
  </select>

  <select [(ngModel)]="selectedMethod">
    <option value="">All Methods</option>
    <option value="CASH">Cash</option>
    <option value="CARD">Card</option>
    <option value="ONLINE">Online</option>
  </select>

</div>


    <table class="modern-table">

      <thead>
        <tr>
          <th>ID</th>
          <th>Amount</th>
          <th>Method</th>
          <th>Status</th>
          <th>Date</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let p of filteredPayments">
          <td>#{{p.paymentId}}</td>
          <td class="amount">{{p.amount}} TND</td>
          <td>{{p.method}}</td>

          <td>
            <span class="badge"
              [ngClass]="{
                'paid': p.status === 'PAID',
                'pending': p.status === 'PENDING',
                'failed': p.status === 'FAILED'
              }">
              {{p.status}}
            </span>
          </td>

          <td>{{p.date | date:'short'}}</td>

          <td>
            <button class="delete-btn"
              (click)="deletePayment(p.paymentId)">
              Delete
            </button>
          </td>
        </tr>
      </tbody>

    </table>

  </div>

</div>
