<div class="report-wrapper">

  <div class="report-card">
    
  <div class="reports-title">Reports Management</div>

  <div class="filters">
    <input type="text" placeholder="Search by title..."
           [(ngModel)]="searchTerm">

    <input type="number" placeholder="Min Revenue"
           [(ngModel)]="minRevenue">

    <input type="number" placeholder="Max Revenue"
           [(ngModel)]="maxRevenue">
  </div>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Description</th>
        <th>Total Revenue</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let r of filteredReports()">
        <td>#{{r.id}}</td>
        <td>{{r.title}}</td>
        <td>{{r.description}}</td>
        <td class="amount">{{r.totalRevenue}} TND</td>
        <td>{{r.createdDate | date:'short'}}</td>
        <td>
          <button class="delete-btn"
                  (click)="deleteReport(r.id)">
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </table>
</div>


</div>
