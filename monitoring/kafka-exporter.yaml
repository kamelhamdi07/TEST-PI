apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-exporter-config
  namespace: monitoring
data:
  KAFKA_BROKERS: kafka.kafka.svc.cluster.local:9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: monitoring
  labels:
    app: kafka-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:v1.8.0
          args:
            - --kafka.server=$(KAFKA_BROKERS)
          envFrom:
            - configMapRef:
                name: kafka-exporter-config
          ports:
            - containerPort: 9308
              name: metrics
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: monitoring
spec:
  selector:
    app: kafka-exporter
  ports:
    - name: metrics
      port: 9308
      targetPort: 9308
