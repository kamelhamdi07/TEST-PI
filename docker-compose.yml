services:
  mysql:
    image: mysql:8.4
    container_name: pi-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: pidev
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pi-network

  eureka-server:
    build:
      context: ./Eureka-main/Eureka-main
    container_name: pi-eureka-server
    restart: unless-stopped
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    ports:
      - "8761:8761"
    networks:
      - pi-network

  api-gateway:
    build:
      context: ./API_Gateway
    container_name: pi-api-gateway
    restart: unless-stopped
    depends_on:
      - eureka-server
    environment:
      SPRING_APPLICATION_NAME: payment-service
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    ports:
      - "8080:8080"
    networks:
      - pi-network

  payment-service:
    build:
      context: ./payment_Microsevices/payment_Microsevices
    container_name: pi-payment-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pidev?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
    ports:
      - "8083:8083"
    networks:
      - pi-network

  reporting-service:
    build:
      context: ./reporting-service
    container_name: pi-reporting-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_started
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/pidev?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
    ports:
      - "8085:8085"
    networks:
      - pi-network

  angular-front:
    build:
      context: ./esm-front-main
    container_name: pi-angular-front
    restart: unless-stopped
    depends_on:
      - payment-service
      - reporting-service
    ports:
      - "4200:80"
    networks:
      - pi-network

networks:
  pi-network:
    driver: bridge

volumes:
  mysql-data:
